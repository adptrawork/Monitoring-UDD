            var firstDate = patient.dates[0];

        // Load data for a specific date — grouped by session with continuous numbering
        function loadDataForTanggal(tanggalKey) {
            var pdata = selectedPatient.data[tanggalKey] || { obat: [], bhp: [] };
            var sesiOrder = ['PAGI', 'SIANG', 'MALAM'];

            function flattenBySession(items) {
                var groups = {};
                items.forEach(function (item, idx) {
                    var s = getSessionByIndex(idx);
                    if (!groups[s]) groups[s] = [];
                    groups[s].push({ no: item.no, nama: item.nama, qty: item.qty, waktu: s });
                });
                var result = [];
                var no = 1;
                sesiOrder.forEach(function (s) {
                    (groups[s] || []).forEach(function (item) {
                        result.push({ no: no++, nama: item.nama, qty: item.qty, waktu: item.waktu });
                    });
                });
                return { data: result, groups: groups };
            }

            var obatResult = flattenBySession(pdata.obat);
            var bhpResult = flattenBySession(pdata.bhp);

            // Store group info for drawCallback
            window.currentObatGroups = obatResult.groups;
            window.currentBhpGroups = bhpResult.groups;

            tabelObat.clear().rows.add(obatResult.data).draw();
            tabelBhp.clear().rows.add(bhpResult.data).draw();
        }

            $('#tabel-tanggal tbody tr').removeClass('active');
            row.addClass('active');
            $('#label-tanggal-obat, #label-tanggal-bhp').text(tglFormatted);
            loadDataForTanggal(tanggalKey);
        });

            var maxDays = 10;

            var html = '';
            html += '<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><title>Cetak CPOR - ' + p.nama + '</title>';
            html += '<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">';
            html += '<style>';
            html += '@page { size: landscape; margin: 5mm; }';
            html += 'body { font-size: 10px; color: #000; font-family: Arial, sans-serif; }';
            html += '.paper { background: #fff; width: 100%; padding: 10px; }';
            html += '.table-cpor { width: 100%; border-collapse: collapse; table-layout: fixed; }';
            html += '.table-cpor th, .table-cpor td { border: 1px solid #000 !important; padding: 4px 2px; vertical-align: middle; }';
            html += '.bg-grey { background-color: #f2f2f2 !important; font-weight: bold; text-align: center; }';
            html += '.text-left { text-align: left !important; padding-left: 8px !important; }';
            html += '.text-center { text-align: center !important; }';
            html += '.text-right { text-align: right !important; padding-right: 8px !important; }';
            html += '.col-no { width: 30px; } .col-nama { width: 220px; } .col-tgl { width: 35px; }';
            html += '.col-sesi { width: 12px; font-size: 8px; padding: 2px 0 !important; text-align: center; }';
            html += '.col-sm { width: 45px; } .col-price { width: 85px; }';
            html += '.header-val { font-weight: bold; text-transform: uppercase; }';
            html += '@media print { .btn-print { display: none; } .paper { margin: 0; padding: 0; } }';
            html += '</style></head><body>';
            html += '<div class="text-center my-3 btn-print"><button onclick="window.print()" class="btn btn-dark">Cetak Laporan CPOR</button></div>';
            html += '<div class="paper">';
            html += '<div class="text-center mb-2"><h6 class="font-weight-bold">CATATAN PEMBERIAN OBAT PASIEN RAWAT INAP</h6></div>';

            // Header
            html += '<table class="table-cpor mb-2"><tr>';
            html += '<td style="width:15%;" class="p-0"><table class="w-100 h-100" style="border:none!important;"><tr><td class="bg-grey" style="border:none!important;border-bottom:1px solid #000!important;">INSTRUKSI TERAPI</td></tr>';
            html += '<tr><td style="border:none!important;border-bottom:1px solid #000!important;">Ruangan: <br><span class="header-val">' + p.ruangan + '</span></td></tr>';
            html += '<tr><td style="border:none!important;">Kelas: <br><span class="header-val">' + p.kelas + '</span></td></tr></table></td>';
            html += '<td class="text-left" style="width:30%;">Nama Pasien : <span class="header-val">' + p.nama + '</span><br>No. RM : <span class="header-val">' + p.rm + '</span><br>Jenis Kelamin : <span class="header-val">' + p.jk + '</span><br>Tgl Masuk : <span class="header-val">' + p.tglMasuk + '</span><br>Tgl Keluar : <span class="header-val">' + p.tglKeluar + '</span></td>';
            html += '<td class="text-left" style="width:27%;">Diagnosa : <br>' + p.diagnosa.split(',').map(function (d, i) { return (i + 1) + '. <span class="header-val">' + d.trim() + '</span>'; }).join('<br>') + '</td>';
            html += '<td class="text-left" style="width:28%;">Dokter : <br>' + p.dokter.split('<br>').map(function (d, i) { return (i + 1) + '. <span class="header-val">' + d.trim() + '</span>'; }).join('<br>') + '</td>';
            html += '</tr></table>';

            // Build matrix data with session grouping
            var obatMap = {}, bhpMap = {};
            dates.forEach(function (tgl) {
                var dd = p.data[tgl] || { obat: [], bhp: [] };
                dd.obat.forEach(function (o, idx) {
                    var sesi = getSessionByIndex(idx);
                    var key = o.nama + '_' + sesi;
                    if (!obatMap[key]) obatMap[key] = { nama: o.nama, harga: o.harga, sesi: sesi, qtyPerDay: {} };
                    obatMap[key].qtyPerDay[tgl] = o.qty;
                });
                dd.bhp.forEach(function (b, idx) {
                    var sesi = getSessionByIndex(idx);
                    var key = b.nama + '_' + sesi;
                    if (!bhpMap[key]) bhpMap[key] = { nama: b.nama, harga: b.harga, sesi: sesi, qtyPerDay: {} };
                    bhpMap[key].qtyPerDay[tgl] = b.qty;
                });
            });
            var obatRows = Object.values(obatMap);
            var bhpRows = Object.values(bhpMap);

            function calcTotal(items) {
                var total = 0;
                items.forEach(function (item) {
                    var jml = 0;
                    dates.forEach(function (tgl) { jml += (item.qtyPerDay[tgl] || 0); });
                    total += jml * parseInt(item.harga.replace(/\./g, ''), 10);
                });
                return total;
            }
            var totalBiaya = calcTotal(obatRows) + calcTotal(bhpRows);

            // Matrix table header with P|S|M sub-columns
            html += '<table class="table-cpor"><thead>';
            html += '<tr class="bg-grey"><th class="col-no" rowspan="3">NO</th><th class="col-nama" rowspan="3">NAMA PERBEKALAN FARMASI</th><th colspan="' + (maxDays * 3) + '">TANGGAL RAWAT (QTY)</th><th class="col-sm" rowspan="3">RET</th><th class="col-sm" rowspan="3">JML</th><th class="col-price" rowspan="3">Harga Satuan</th><th class="col-price" rowspan="3">Total Harga</th></tr>';
            html += '<tr class="bg-grey text-center">';
            for (var d = 0; d < maxDays; d++) {
                var label = (d < dates.length) ? formatTanggalPendek(dates[d]) : '';
                html += '<td colspan="3" class="col-tgl">' + label + '</td>';
            }
            html += '</tr>';
            html += '<tr class="bg-grey text-center">';
            for (var d = 0; d < maxDays; d++) {
                html += '<td class="col-sesi">P</td><td class="col-sesi">S</td><td class="col-sesi">M</td>';
            }
            html += '</tr></thead><tbody>';

            // OBAT section
            html += '<tr class="bg-grey"><td colspan="' + (maxDays * 3 + 6) + '" class="text-left">OBAT</td></tr>';
            html += buildMatrixRows(obatRows, dates, maxDays, 1);

            // BHP section
            html += '<tr class="bg-grey"><td colspan="' + (maxDays * 3 + 6) + '" class="text-left">ALKES / BHP</td></tr>';
            html += buildMatrixRows(bhpRows, dates, maxDays, obatRows.length + 1);

            html += '</tbody><tfoot><tr>';
            html += '<td colspan="2" rowspan="2" class="text-center" style="vertical-align:top;padding-top:10px;">Tanda Terima<br><br><br>( Pasien / Keluarga / Perawat )<br><small>*) Coret yang tidak perlu</small></td>';
            for (var f = 1; f <= maxDays * 3; f++) html += '<td class="col-sesi"></td>';
            html += '<td colspan="3" class="bg-grey text-right">TOTAL BIAYA :</td>';
            html += '<td class="text-right font-weight-bold" style="font-size:11px;">' + formatRupiah(totalBiaya) + '</td>';
            html += '</tr><tr><td colspan="' + (maxDays * 3) + '" class="text-center" style="font-size:8px;height:30px;">Catatan Pemberian Obat Rawat Inap</td><td colspan="4" class="bg-grey"></td></tr></tfoot>';
            html += '</table></div></body></html>';

            var w = window.open('', '_blank', 'width=1200,height=800');
            if (!w) { alert('Popup diblokir. Izinkan popup, lalu klik Cetak lagi.'); return; }
            w.document.write(html);
            w.document.close();
            w.focus();
            w.onload = function () { setTimeout(function () { w.print(); }, 500); };
        }

        function buildMatrixRows(items, dates, maxDays, startNo) {
            var html = '', no = startNo;
            var sesiOrder = { PAGI: 0, SIANG: 1, MALAM: 2 };
            items.sort(function (a, b) { return (sesiOrder[a.sesi] || 99) - (sesiOrder[b.sesi] || 99); });
            var lastSesi = null;
            items.forEach(function (item) {
                if (lastSesi !== item.sesi) {
                    html += '<tr class="bg-grey"><td colspan="' + (maxDays * 3 + 6) + '" class="text-left">SESI <strong>' + item.sesi + '</strong></td></tr>';
                    lastSesi = item.sesi;
                }
                var jml = 0;
                html += '<tr>';
                html += '<td class="text-center">' + (no++) + '</td>';
                html += '<td class="text-left">' + item.nama + '</td>';
                for (var d = 0; d < maxDays; d++) {
                    var qty = (d < dates.length) ? (item.qtyPerDay[dates[d]] || '') : '';
                    if (qty !== '') jml += qty;
                    for (var s = 0; s < 3; s++) {
                        if (s === sesiOrder[item.sesi]) {
                            html += '<td class="text-center">' + (qty !== '' ? qty : '') + '</td>';
                        } else {
                            html += '<td class="text-center"></td>';
                        }
                    }
                }
                html += '<td class="text-center">0</td>';
                html += '<td class="text-center">' + jml + '</td>';
                html += '<td class="text-right">' + item.harga + '</td>';
                html += '<td class="text-right">' + formatRupiah(jml * parseInt(item.harga.replace(/\./g, ''), 10)) + '</td>';
                html += '</tr>';
            });
            return html;
        }

        // ======================================================================
        // INIT — On document ready
        // ======================================================================
        $(document).ready(function () {
            // Parse patientId from URL query string
            var params = new URLSearchParams(window.location.search);
            var patientId = parseInt(params.get('patientId'), 10);
            var patient = patientDB.find(function (p) { return p.id === patientId; }) || patientDB[0];

            loadPatientDetail(patient);
        });

    </script>

</body>

</html>
