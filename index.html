    <!-- ================================================================ -->

        <div class="panel-body" style="padding: 10px;">

                        <th>Ruangan</th>
                        <th>Kelas</th>
                        <th>Tgl Masuk</th>
                        <th>Status</th>
                        <th>Penjamin</th>
                        <th>No. REG</th>
                        <th style="width:70px;">Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div><!-- /main-container -->

<script>

// ======================================================================
// INISIALISASI DATATABLES
// ======================================================================
var tabelPasien = $('#tabel-pasien').DataTable({
    paging: true,
    pageLength: 10,
    searching: true,
    info: true,
    order: [[0, 'asc']],
    language: {
        search: 'Cari: ',
        lengthMenu: 'Tampilkan _MENU_ data',
        info: 'Menampilkan _START_ s/d _END_ dari _TOTAL_ pasien',
        emptyTable: 'Tidak ada data pasien',
        zeroRecords: 'Tidak ditemukan pasien yang cocok'
    },
    columns: [
        { data: 'no' },
        { data: 'rm' },
        { data: 'nama' },
        { data: 'ruangan' },
        { data: 'kelas' },
        { data: 'tglMasuk' },
        { data: 'status', render: function(d) {
            var cls = d === 'Masih Dirawat' ? 'warning' : 'success';
            return '<span class="label label-' + cls + ' status-badge">' + d + '</span>';
        }},
        { data: 'penjamin' },
        { data: 'noReg' },
        { data: null, orderable: false, defaultContent: '<button class="btn btn-success btn-xs btn-pilih"><i class="fa fa-arrow-right"></i> Pilih</button>' }
    ]
});

// ======================================================================
// LOAD PATIENT TABLE WITH OPTIONAL FILTER
// ======================================================================
function loadPatientTable(filter) {
    filter = filter || {};
    var rows = [];
    patientDB.forEach(function(p) {
        if (filter.unit && p.ruangan !== filter.unit) return;
        if (filter.status && p.status !== filter.status) return;
        if (filter.penjamin && p.penjamin.toLowerCase().indexOf(filter.penjamin.toLowerCase()) < 0) return;
        if (filter.rm && p.rm.indexOf(filter.rm) < 0) return;
        if (filter.reg && p.noReg.toLowerCase().indexOf(filter.reg.toLowerCase()) < 0) return;
        if (filter.bayar && p.statusBayar !== filter.bayar) return;
        rows.push({
            no: rows.length + 1,
            rm: p.rm, nama: p.nama, ruangan: p.ruangan, kelas: p.kelas,
            tglMasuk: p.tglMasuk, status: p.status, penjamin: p.penjamin,
            noReg: p.noReg, patientId: p.id
        });
    });
    tabelPasien.clear().rows.add(rows).draw();
    $('#jumlah-pasien').text(rows.length + ' data');
}

// ======================================================================
// EVENT HANDLERS
// ======================================================================

// Klik "Pilih" → navigasi ke halaman detail
$('#tabel-pasien tbody').on('click', '.btn-pilih', function() {
    var rowData = tabelPasien.row($(this).closest('tr')).data();
    if (!rowData) return;
    window.location.href = 'prototype-monitoring-udd.html?patientId=' + rowData.patientId;
});

// Double-click row juga bisa
$('#tabel-pasien tbody').on('dblclick', 'tr', function() {
    var rowData = tabelPasien.row(this).data();
    if (!rowData) return;
    window.location.href = 'prototype-monitoring-udd.html?patientId=' + rowData.patientId;
});

// Tombol Cari
$('#btn-cari').on('click', function() {
    loadPatientTable({
        unit: $('#filter-unit').val(),
        status: $('#filter-status').val(),
        penjamin: $('#filter-penjamin').val().trim(),
        rm: $('#filter-rm').val().trim(),
        reg: $('#filter-reg').val().trim(),
        bayar: $('#filter-bayar').val()
    });
});

// Tombol Reset
$('#btn-reset').on('click', function() {
    $('#filter-unit, #filter-status, #filter-bayar').val('');
    $('#filter-penjamin, #filter-rm, #filter-reg').val('');
    loadPatientTable();
});

// Enter key trigger search
$('#filter-rm, #filter-reg, #filter-penjamin').on('keypress', function(e) {
    if (e.which === 13) $('#btn-cari').click();
});

// ======================================================================
// INIT
// ======================================================================
$(document).ready(function() {
    $('.input-group.date').datepicker({
        format: 'dd/mm/yyyy',
        autoclose: true,
        todayHighlight: true
    });

    loadPatientTable();
});
</script>
